name: Terraform CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Configuración de Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      # 3. Inicialización
      - name: Terraform Init
        run: terraform init

      # 4. Validación sintáctica
      - name: Terraform Validate
        run: terraform validate

      # 5. Linter de Terraform (TFLint)
      - name: TFLint
        uses: terraform-linters/tflint-action@v3
        with:
          args: --init --recursive

      # 6. Validación de seguridad con Checkov
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .

      # 7. Plan de despliegue (solo en pull_request)
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -var-file="terraform.tfvars"

      # 8. Aplicación (solo en push a main)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -var-file="terraform.tfvars" -auto-approve
